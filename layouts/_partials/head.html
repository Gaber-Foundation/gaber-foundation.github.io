<head>
  <title>{{ with .Title }}{{ humanize . }} | {{ end }}{{ .Site.Title }}</title>
  <meta charset='utf-8'>
  {{- with site.Params.ga_verify }}
  <meta name="google-site-verification" content="{{ . }}" />
  {{- end }}
  <meta name="viewport" content ="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  {{- partialCached "analytics" . }}
  {{- partial "opengraph" . }}
  {{- partialCached "favicon" . }}
  {{- partialCached "styles" . }}
  <script>
  // قلب هوية الموقع للعربية واليمين
  document.documentElement.lang = "ar";
  document.documentElement.dir = "rtl";
</script>

<style>
  /* إجبار الاتجاه يمين في كل الموقع */
  body {
    direction: rtl !important;
    text-align: right !important;
  }

  /* تنسيق الهيدر: اللوجو يمين والمنيو شمال */
  header .container {
    display: flex !important;
    flex-direction: row !important; /* الهوية بقت RTL فـ Row بتبدأ يمين */
    justify-content: space-between !important;
  }

  /* القائمة المنسدلة تفتح من اليمين */
  .nav-menu, .dropdown-menu {
    right: 0 !important;
    left: auto !important;
    text-align: right !important;
  }
</style>
</head>
