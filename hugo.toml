# الإعدادات العامة للموقع
baseURL = 'https://gaber-foundation.github.io/'
title = 'مؤسسة جابر للبحث والتحقيق'
theme = ["github.com/onweru/newsroom"]
defaultContentLanguage = 'ar'

# إعدادات الأقسام الرئيسية والمحتوى
[params]
    mainSections = ["post", "posts"]
    blogDir = "posts"
    description = "مؤسسة صحفية استقصائية - كشف الحقائق ونصرة المظلوم"

# إعدادات اللغة العربية والـ RTL
[languages.ar]
    contentDir = 'content'
    languageName = 'العربية'
    weight = 1
    languagedirection = 'rtl'

# توجيه المسارات للمجلدات التي تبدأ بـ _
[[module.mounts]]
    source = 'layouts'
    target = 'layouts'

[[module.mounts]]
    source = 'layouts/_partials'
    target = 'layouts/partials'

[[module.mounts]]
    source = 'layouts/_shortcodes'
    target = 'layouts/shortcodes'

[[module.mounts]]
    source = 'assets'
    target = 'assets'
