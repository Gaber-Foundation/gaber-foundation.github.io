baseURL = "https://gaber-foundation.github.io/"
title = "مؤسسة جابر للبحث والتحقيق"
defaultContentLanguage = 'ar'

# استيراد الثيم كموديول بشكل صحيح
[module]
  [[module.imports]]
    path = "github.com/onweru/newsroom"

[params]
    mainSections = ["post", "posts"]
    blogDir = "posts"
    description = "مؤسسة صحفية استقصائية - كشف الحقائق ونصرة المظلوم"

[languages.ar]
    contentDir = 'content'
    label = 'العربية'       # التعديل الجديد
    weight = 1
    direction = 'rtl'   # التعديل الجديد


[permalinks]
pages = ':contentbasename/'

# If you want to use disqus, uncomment the line below
# disqusShortname = "yourdiscussshortname"
