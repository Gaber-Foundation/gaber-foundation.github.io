baseURL = "https://gaber-foundation.github.io/"
title = "مؤسسة جابر للبحث والتحقيق"
defaultContentLanguage = 'ar'

# الطريقة الصحيحة لاستدعاء القالب كـ Module
[module]
  [[module.imports]]
    path = "github.com/onweru/newsroom"

[params]
    mainSections = ["post", "posts"]
    blogDir = "posts"
    description = "مؤسسة صحفية استقصائية - كشف الحقائق ونصرة المظلوم"

[languages.ar]
    contentDir = 'content'
    label = 'العربية'       # بدل languageName (عشان الـ WARN يختفي)
    weight = 1
    direction = 'rtl'   # بدل languageDirection (عشان الـ WARN يختفي)
