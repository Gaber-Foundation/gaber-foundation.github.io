baseurl = "https://gaber-foundation.github.io/" # الرابط الملكي بتاعك
title = "مؤسسة جابر للبحث والتحقيق"
theme = "newsroom" # عشان إنتِ عملتي Fork للمستودع ده
author = "فاطمة سعيد جابر"

[params]
  description = "مؤسسة استقصائية لكشف الحقائق ورد المظالم"
  mainSections = ["posts", "pages"]
  # هنا نقدر نضبط اتجاه الكتابة للعربي
  languageName = "Arabic"
  contentDir = "content"
  defaultContentLanguage = "ar"

[pagination]
  disableAliases = false
  pagerSize = 10
  path = 'page'

[permalinks]
  pages = ':contentbasename/'

# لغة الموقع الأساسية عربي
[languages]
  [languages.ar]
    languageCode = "ar"
    contentDir = "content"
    weight = 1
