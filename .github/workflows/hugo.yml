baseURL = 'https://gaber-foundation.github.io/'
title = 'مؤسسة جابر للبحث والتحقيق'
theme = 'newsroom'

# إعدادات اللغة العربية والـ RTL
defaultContentLanguage = 'ar'
languageCode = 'ar'

[languages]
  [languages.ar]
    languageName = 'العربية'
    contentDir = 'content'
    weight = 1
    languagedirection = 'rtl' # هنا السحر اللي هيقلب الموقع يمين

[params]
    description = "مؤسسة صحفية استقصائية - كشف الحقائق ونصرة المظلوم"
    author = "فاطمة سعيد جابر"
    # لو عندك صفحة فيسبوك حطي الرابط هنا
    facebook = "https://facebook.com/GaberFoundation" 

[menu]
  [[menu.main]]
    name = "الرئيسية"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "عن المؤسسة"
    url = "/about"
    weight = 2
